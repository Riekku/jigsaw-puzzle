<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pro Jigsaw: Classic Shapes & Controls</title>
    <style>
        body { margin: 0; background-color: #1a1a1a; font-family: sans-serif; overflow: hidden; display: flex; justify-content: center; align-items: center; height: 100vh; touch-action: none; }
        canvas { background-color: #2c3e50; box-shadow: 0 0 50px rgba(0,0,0,0.8); }
        
        #ui { position: absolute; top: 20px; left: 20px; color: white; pointer-events: none; text-shadow: 1px 1px 2px black; z-index: 10;}
        #side-controls { position: absolute; top: 20px; right: 20px; display: flex; flex-direction: column; gap: 10px; z-index: 10; }
        
        .overlay { position: absolute; background: rgba(0,0,0,0.85); color: white; padding: 30px 40px; border-radius: 15px; text-align: center; z-index: 100; box-shadow: 0 10px 30px rgba(0,0,0,0.5); max-width: 400px; }
        
        .piece-settings { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-bottom: 20px; }
        .piece-settings input { display: none; }
        .piece-settings label { background: #34495e; border: 2px solid transparent; border-radius: 8px; cursor: pointer; font-size: 15px; font-weight: bold; padding: 10px 8px; transition: background 0.2s, border-color 0.2s; }
        .piece-settings input:checked + label { background: #27ae60; border-color: #9ff0bf; }
        
        button { padding: 12px 24px; font-size: 16px; cursor: pointer; background: #27ae60; border: none; color: white; border-radius: 5px; margin-top: 10px; width: 100%; transition: background 0.2s; font-weight: bold; box-shadow: 0 4px 6px rgba(0,0,0,0.3);}
        button:hover { background: #2ecc71; }
        .side-btn { padding: 10px 15px; font-size: 14px; background: #34495e; border-radius: 8px; }
        .side-btn:hover { background: #455a64; }
        
        input[type="text"] { padding: 10px; width: calc(100% - 20px); font-size: 16px; border-radius: 5px; border: 1px solid #ccc; margin-bottom: 10px; }
        input[type="file"] { margin: 10px 0; background: #333; padding: 10px; border-radius: 5px; width: calc(100% - 20px); cursor: pointer; color: white; }
        
        hr { border-color: #444; margin: 20px 0; }
        .hidden { display: none !important; }
        #loadingMsg { color: #f1c40f; margin-top: 15px; font-weight: bold; }
    </style>
</head>
<body>

<div id="ui">
    <div id="stats" style="font-size: 20px; font-weight: bold;"></div>
</div>

<div id="side-controls" class="hidden">
    <button class="side-btn" onclick="restartPuzzle()">🔄 Restart Current</button>
    <button class="side-btn" onclick="showSettings()">⚙️ New Picture</button>
</div>

<div id="menu" class="overlay">
    <h2>Jigsaw Generator</h2>
    
    <h3>Pieces</h3>
    <div class="piece-settings">
        <input type="radio" name="pieceCount" id="pieces20" value="20" checked>
        <label for="pieces20">20</label>
        <input type="radio" name="pieceCount" id="pieces50" value="50">
        <label for="pieces50">50</label>
        <input type="radio" name="pieceCount" id="pieces100" value="100">
        <label for="pieces100">100</label>
        <input type="radio" name="pieceCount" id="pieces200" value="200">
        <label for="pieces200">200</label>
    </div>

    <hr>

    <h3>Option 1: Upload Image</h3>
    <input type="file" id="imageUpload" accept="image/*">

    <hr>

    <h3>Option 2: AI Generate</h3>
    <input type="text" id="aiPrompt" placeholder="e.g., A cozy cabin in the woods, painted">
    <button onclick="generateAIImage()">Generate AI Puzzle</button>

    <div id="loadingMsg" class="hidden">Loading image... please wait.</div>
</div>

<div id="win-message" class="overlay hidden">
    <h1>Perfect Fit!</h1>
    <button onclick="restartPuzzle()">Play Again</button>
    <button onclick="showSettings()">Change Picture</button>
</div>

<canvas id="gameCanvas"></canvas>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d', { alpha: false });

let pieces = [];
let selectedPiece = null;
let offset = { x: 0, y: 0 };
let animationFrameId = null;
let boardRect = { x: 0, y: 0, w: 0, h: 0 };
let staticLayerCanvas = document.createElement('canvas');
let staticLayerCtx = staticLayerCanvas.getContext('2d', { alpha: false });
let staticLayerDirty = true;
let currentRows = 4;
let currentCols = 5;
const trayPadding = 18;
const trayTopPadding = 82;
const puzzleSizes = {
    20: { rows: 4, cols: 5 },
    50: { rows: 5, cols: 10 },
    100: { rows: 10, cols: 10 },
    200: { rows: 10, cols: 20 }
};

let puzzleImage = new Image();
puzzleImage.crossOrigin = "Anonymous"; 

// --- GAME FLOW CONTROLS ---

document.getElementById('imageUpload').addEventListener('change', function(e) {
    const file = e.target.files[0];
    if (!file) return;
    document.getElementById('loadingMsg').innerText = "Processing your image...";
    document.getElementById('loadingMsg').classList.remove('hidden');
    const objectUrl = URL.createObjectURL(file);
    loadImage(objectUrl, () => URL.revokeObjectURL(objectUrl));
});

function generateAIImage() {
    const prompt = document.getElementById('aiPrompt').value;
    if (!prompt) {
        alert("Please enter a description for the AI!");
        return;
    }
    document.getElementById('loadingMsg').innerText = "Generating AI art... this takes a few seconds.";
    document.getElementById('loadingMsg').classList.remove('hidden');
    const safePrompt = encodeURIComponent(prompt);
    const aiUrl = `https://image.pollinations.ai/prompt/${safePrompt}?width=800&height=600&nologo=true`;
    loadImage(aiUrl);
}

function getPuzzleConfig() {
    const selected = document.querySelector('input[name="pieceCount"]:checked');
    return puzzleSizes[selected ? selected.value : 20];
}

function loadImage(src, afterLoad) {
    puzzleImage.src = src;
    puzzleImage.onload = () => {
        if (afterLoad) afterLoad();
        if (scaleImageToFitScreen()) return;
        initGame();
    };
    puzzleImage.onerror = () => {
        alert("Failed to load image. Please try a different one or adjust your prompt.");
        document.getElementById('loadingMsg').classList.add('hidden');
    };
}

function scaleImageToFitScreen() {
    const { cols } = getPuzzleConfig();
    const sideColumns = Math.ceil(cols / 2);
    const sideTrayRatio = (sideColumns / cols) * 1.35;
    const maxWidth = window.innerWidth / (1 + sideTrayRatio * 2);
    const maxHeight = (window.innerHeight - trayTopPadding - trayPadding) / 1.35;
    
    if (puzzleImage.width > maxWidth || puzzleImage.height > maxHeight) {
        const ratio = Math.min(maxWidth / puzzleImage.width, maxHeight / puzzleImage.height);
        const tempCanvas = document.createElement('canvas');
        tempCanvas.width = puzzleImage.width * ratio;
        tempCanvas.height = puzzleImage.height * ratio;
        const tempCtx = tempCanvas.getContext('2d');
        tempCtx.drawImage(puzzleImage, 0, 0, tempCanvas.width, tempCanvas.height);
        puzzleImage.src = tempCanvas.toDataURL();
        return true;
    }
    return false;
}

function updateBoardRect() {
    boardRect = {
        x: (canvas.width - puzzleImage.width) / 2,
        y: (canvas.height - puzzleImage.height) / 2,
        w: puzzleImage.width,
        h: puzzleImage.height
    };
    staticLayerDirty = true;
}

function resizeStaticLayer() {
    if (staticLayerCanvas.width !== canvas.width || staticLayerCanvas.height !== canvas.height) {
        staticLayerCanvas.width = canvas.width;
        staticLayerCanvas.height = canvas.height;
        staticLayerDirty = true;
    }
}

function rebuildStaticLayer() {
    resizeStaticLayer();
    staticLayerCtx.fillStyle = "#2c3e50";
    staticLayerCtx.fillRect(0, 0, staticLayerCanvas.width, staticLayerCanvas.height);
    staticLayerCtx.globalAlpha = 0.16;
    staticLayerCtx.drawImage(puzzleImage, boardRect.x, boardRect.y);
    staticLayerCtx.globalAlpha = 1.0;

    for (const piece of pieces) {
        if (piece.isLocked) piece.draw(staticLayerCtx);
    }

    staticLayerDirty = false;
}

function positionPiecesInSideTrays(rows, cols, pieceW, pieceH) {
    const loosePieces = pieces.filter(p => !p.isLocked);
    const tabRoomX = pieceW * 0.32;
    const tabRoomY = pieceH * 0.32;
    const slotW = Math.max(pieceW * 1.3, 34);
    const slotH = Math.max(pieceH * 1.3, 34);
    const availableRows = Math.max(1, Math.floor((canvas.height - trayTopPadding - trayPadding) / slotH));
    const perSide = Math.ceil(loosePieces.length / 2);

    loosePieces.forEach((piece, index) => {
        const sideIndex = index < perSide ? index : index - perSide;
        const isLeft = index < perSide;
        const stackCol = Math.floor(sideIndex / availableRows);
        const stackRow = sideIndex % availableRows;
        const sideOffset = stackCol * slotW + trayPadding + tabRoomX;
        const trayX = isLeft
            ? boardRect.x - sideOffset - pieceW
            : boardRect.x + boardRect.w + sideOffset;
        const trayY = trayTopPadding + stackRow * slotH + tabRoomY;

        piece.x = Math.max(trayPadding, Math.min(canvas.width - pieceW - trayPadding, trayX));
        piece.y = Math.max(trayTopPadding, Math.min(canvas.height - pieceH - trayPadding, trayY));
    });
}

function updatePieceTargets() {
    const pieceW = puzzleImage.width / currentCols;
    const pieceH = puzzleImage.height / currentRows;
    pieces.forEach(piece => {
        piece.targetX = piece.col * pieceW + boardRect.x;
        piece.targetY = piece.row * pieceH + boardRect.y;
        if (piece.isLocked) {
            piece.x = piece.targetX;
            piece.y = piece.targetY;
        }
    });
}

function requestRender() {
    if (animationFrameId) return;
    animationFrameId = requestAnimationFrame(renderFrame);
}

function randomEdgeShape(type) {
    return {
        type,
        center: 0.44 + Math.random() * 0.12,
        width: 0.34 + Math.random() * 0.16,
        depth: 0.17 + Math.random() * 0.1,
        neck: 0.12 + Math.random() * 0.08,
        shoulder: 0.18 + Math.random() * 0.08,
        roundness: 0.78 + Math.random() * 0.34
    };
}

function matchingEdge(edge, type, flipCenter = false) {
    return {
        ...edge,
        type,
        center: flipCenter ? 1 - edge.center : edge.center
    };
}

function oppositeEdgeType(type) {
    return type === 'tab' ? 'blank' : 'tab';
}

function restartPuzzle() {
    document.getElementById('win-message').classList.add('hidden');
    initGame(); 
}

function showSettings() {
    document.getElementById('win-message').classList.add('hidden');
    document.getElementById('menu').classList.remove('hidden');
    document.getElementById('side-controls').classList.add('hidden');
    document.getElementById('loadingMsg').classList.add('hidden');
    
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    if (animationFrameId) {
        cancelAnimationFrame(animationFrameId);
        animationFrameId = null;
    }
    pieces = [];
    document.getElementById('stats').innerText = "";
}

// --- ENGINE & GEOMETRY ---

class JigsawPiece {
    constructor(row, col, width, height, edges) {
        this.row = row;
        this.col = col;
        this.w = width;
        this.h = height;

        this.targetX = col * width + boardRect.x;
        this.targetY = row * height + boardRect.y;
        
        this.imgX = col * width;
        this.imgY = row * height;

        this.x = 0;
        this.y = 0;

        this.isLocked = false;
        this.edges = edges; 
        this.path = this.createPath();
        this.cacheMargin = Math.max(this.w, this.h) * 0.4;
        this.cacheCanvas = this.createCacheCanvas();
    }

    createPath() {
        const path = new Path2D();
        path.moveTo(0, 0);

        this.drawClassicEdge(path, 0, 0, this.w, 0, this.edges[0]); 
        this.drawClassicEdge(path, this.w, 0, this.w, this.h, this.edges[1]); 
        this.drawClassicEdge(path, this.w, this.h, 0, this.h, this.edges[2]); 
        this.drawClassicEdge(path, 0, this.h, 0, 0, this.edges[3]); 

        path.closePath();
        return path;
    }

    drawClassicEdge(path, x1, y1, x2, y2, edge) {
        if (edge === 'flat' || edge.type === 'flat') {
            path.lineTo(x2, y2);
            return;
        }

        const dx = x2 - x1;
        const dy = y2 - y1;
        const len = Math.hypot(dx, dy);
        
        const nx = dx / len;
        const ny = dy / len;
        const px = -ny;
        const py = nx;

        const sign = edge.type === 'tab' ? 1 : -1;
        const tabDepth = len * edge.depth * sign;
        const center = len * edge.center;
        const halfWidth = len * edge.width * 0.5;
        const neck = len * edge.neck;
        const shoulder = len * edge.shoulder;
        const roundness = edge.roundness;
        const start = Math.max(len * 0.08, center - halfWidth);
        const leftNeck = Math.max(start + len * 0.04, center - neck);
        const rightNeck = Math.min(len * 0.92, center + neck);
        const end = Math.min(len * 0.92, center + halfWidth);
        
        path.lineTo(x1 + nx * start, y1 + ny * start);

        path.bezierCurveTo(
            x1 + nx * (start + shoulder * 0.35) + px * (tabDepth * 0.08), y1 + ny * (start + shoulder * 0.35) + py * (tabDepth * 0.08),
            x1 + nx * (leftNeck - shoulder * 0.45) + px * (tabDepth * 0.58), y1 + ny * (leftNeck - shoulder * 0.45) + py * (tabDepth * 0.58),
            x1 + nx * leftNeck + px * (tabDepth * roundness), y1 + ny * leftNeck + py * (tabDepth * roundness)
        );

        path.bezierCurveTo(
            x1 + nx * (center - halfWidth * 0.26) + px * (tabDepth * (1.26 - roundness * 0.12)), y1 + ny * (center - halfWidth * 0.26) + py * (tabDepth * (1.26 - roundness * 0.12)),
            x1 + nx * (center + halfWidth * 0.26) + px * (tabDepth * (1.26 - roundness * 0.12)), y1 + ny * (center + halfWidth * 0.26) + py * (tabDepth * (1.26 - roundness * 0.12)),
            x1 + nx * rightNeck + px * (tabDepth * roundness), y1 + ny * rightNeck + py * (tabDepth * roundness)
        );

        path.bezierCurveTo(
            x1 + nx * (rightNeck + shoulder * 0.45) + px * (tabDepth * 0.58), y1 + ny * (rightNeck + shoulder * 0.45) + py * (tabDepth * 0.58),
            x1 + nx * (end - shoulder * 0.35) + px * (tabDepth * 0.08), y1 + ny * (end - shoulder * 0.35) + py * (tabDepth * 0.08),
            x1 + nx * end, y1 + ny * end
        );

        path.lineTo(x2, y2);
    }

    createCacheCanvas() {
        const cache = document.createElement('canvas');
        const sizeW = Math.ceil(this.w + this.cacheMargin * 2);
        const sizeH = Math.ceil(this.h + this.cacheMargin * 2);
        cache.width = sizeW;
        cache.height = sizeH;
        const cacheCtx = cache.getContext('2d');
        const sourceX = Math.max(0, this.imgX - this.cacheMargin);
        const sourceY = Math.max(0, this.imgY - this.cacheMargin);
        const sourceRight = Math.min(puzzleImage.width, this.imgX + this.w + this.cacheMargin);
        const sourceBottom = Math.min(puzzleImage.height, this.imgY + this.h + this.cacheMargin);
        const sourceW = sourceRight - sourceX;
        const sourceH = sourceBottom - sourceY;
        const destX = this.cacheMargin - (this.imgX - sourceX);
        const destY = this.cacheMargin - (this.imgY - sourceY);

        cacheCtx.save();
        cacheCtx.translate(this.cacheMargin, this.cacheMargin);
        cacheCtx.clip(this.path);
        cacheCtx.drawImage(puzzleImage, sourceX, sourceY, sourceW, sourceH, destX, destY, sourceW, sourceH);
        cacheCtx.restore();

        cacheCtx.save();
        cacheCtx.translate(this.cacheMargin, this.cacheMargin);
        cacheCtx.strokeStyle = "rgba(0,0,0,0.5)";
        cacheCtx.lineWidth = 1.5;
        cacheCtx.stroke(this.path);
        
        cacheCtx.strokeStyle = "rgba(255,255,255,0.2)";
        cacheCtx.lineWidth = 0.5;
        cacheCtx.stroke(this.path);
        cacheCtx.restore();

        return cache;
    }

    draw(ctx) {
        ctx.drawImage(this.cacheCanvas, this.x - this.cacheMargin, this.y - this.cacheMargin);
    }

    contains(mx, my) {
        if (mx >= this.x - this.w * 0.5 && mx <= this.x + this.w * 1.5 && 
            my >= this.y - this.h * 0.5 && my <= this.y + this.h * 1.5) {
            const localX = mx - this.x;
            const localY = my - this.y;
            return ctx.isPointInPath(this.path, localX, localY);
        }
        return false;
    }
}

function initGame() {
    if (animationFrameId) {
        cancelAnimationFrame(animationFrameId);
        animationFrameId = null;
    }

    const { rows, cols } = getPuzzleConfig();
    currentRows = rows;
    currentCols = cols;
    
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
    resizeStaticLayer();

    const pieceW = puzzleImage.width / cols;
    const pieceH = puzzleImage.height / rows;
    updateBoardRect();

    pieces = [];
    const edgeMap = [];
    
    for (let r = 0; r < rows; r++) {
        edgeMap[r] = [];
        for (let c = 0; c < cols; c++) {
            edgeMap[r][c] = {
                top: { type: 'flat' },
                right: { type: 'flat' },
                bottom: { type: 'flat' },
                left: { type: 'flat' }
            };
        }
    }

    for (let r = 0; r < rows; r++) {
        for (let c = 0; c < cols; c++) {
            if (r < rows - 1) {
                const type = (Math.random() > 0.5) ? 'tab' : 'blank';
                const edge = randomEdgeShape(type);
                edgeMap[r][c].bottom = edge;
                edgeMap[r+1][c].top = matchingEdge(edge, oppositeEdgeType(type), true);
            }
            if (c < cols - 1) {
                const type = (Math.random() > 0.5) ? 'tab' : 'blank';
                const edge = randomEdgeShape(type);
                edgeMap[r][c].right = edge;
                edgeMap[r][c+1].left = matchingEdge(edge, oppositeEdgeType(type), true);
            }
        }
    }

    for (let r = 0; r < rows; r++) {
        for (let c = 0; c < cols; c++) {
            const p = new JigsawPiece(r, c, pieceW, pieceH, [
                edgeMap[r][c].top,
                edgeMap[r][c].right,
                edgeMap[r][c].bottom,
                edgeMap[r][c].left
            ]);
            pieces.push(p);
        }
    }

    pieces.sort(() => Math.random() - 0.5);
    positionPiecesInSideTrays(rows, cols, pieceW, pieceH);

    document.getElementById('menu').classList.add('hidden');
    document.getElementById('side-controls').classList.remove('hidden');
    document.getElementById('stats').innerText = `Pieces remaining: ${pieces.length}`;
    
    requestRender();
}

function renderFrame() {
    animationFrameId = null;
    if (staticLayerDirty) rebuildStaticLayer();
    ctx.drawImage(staticLayerCanvas, 0, 0);

    for (const piece of pieces) {
        if (!piece.isLocked && piece !== selectedPiece) piece.draw(ctx);
    }
    if (selectedPiece) selectedPiece.draw(ctx);
}

window.addEventListener('resize', () => {
    if(pieces.length > 0) {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        resizeStaticLayer();
        updateBoardRect();
        updatePieceTargets();
        positionPiecesInSideTrays(currentRows, currentCols, puzzleImage.width / currentCols, puzzleImage.height / currentRows);
        requestRender();
    }
});

// --- INPUT HANDLING (MOUSE & TOUCH) ---

function handlePickup(mx, my) {
    for (let i = pieces.length - 1; i >= 0; i--) {
        if (!pieces[i].isLocked && pieces[i].contains(mx, my)) {
            selectedPiece = pieces[i];
            offset.x = mx - selectedPiece.x;
            offset.y = my - selectedPiece.y;
            
            pieces.splice(i, 1);
            pieces.push(selectedPiece);
            requestRender();
            break;
        }
    }
}

function handleMove(mx, my) {
    if (!selectedPiece) return;
    selectedPiece.x = mx - offset.x;
    selectedPiece.y = my - offset.y;
    requestRender();
}

function handleDrop() {
    if (!selectedPiece) return;

    const dist = Math.hypot(selectedPiece.x - selectedPiece.targetX, selectedPiece.y - selectedPiece.targetY);
    if (dist < 40) {
        selectedPiece.x = selectedPiece.targetX;
        selectedPiece.y = selectedPiece.targetY;
        selectedPiece.isLocked = true;
        staticLayerDirty = true;
        
        const remaining = pieces.filter(p => !p.isLocked).length;
        document.getElementById('stats').innerText = `Pieces remaining: ${remaining}`;

        if (remaining === 0) {
            document.getElementById('win-message').classList.remove('hidden');
        }
    }
    selectedPiece = null;
    requestRender();
}

function getCanvasPoint(e) {
    const rect = canvas.getBoundingClientRect();
    return {
        x: e.clientX - rect.left,
        y: e.clientY - rect.top
    };
}

canvas.addEventListener('pointerdown', (e) => {
    e.preventDefault();
    canvas.setPointerCapture(e.pointerId);
    const point = getCanvasPoint(e);
    handlePickup(point.x, point.y);
});

canvas.addEventListener('pointermove', (e) => {
    if (!selectedPiece) return;
    e.preventDefault();
    const point = getCanvasPoint(e);
    handleMove(point.x, point.y);
});

canvas.addEventListener('pointerup', (e) => {
    if (canvas.hasPointerCapture(e.pointerId)) {
        canvas.releasePointerCapture(e.pointerId);
    }
    handleDrop();
});

canvas.addEventListener('pointercancel', handleDrop);

</script>
</body>
</html>
